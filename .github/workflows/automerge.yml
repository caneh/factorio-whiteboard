name: automerge
on:
  pull_request_target:
    types: [opened, edited, synchronize]
    paths-ignore: ['.github/**/*', '.github']

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    runs-on: ubuntu-latest
    steps:
      - name: Reject PRs that touch .github
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          files=$(gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" \
            --paginate --jq '.[].filename')
          echo "Changed files:"
          echo "$files"
          if echo "$files" | grep -iq '^\.github'; then
            echo "PR touches .github - refusing to automerge."
            marker="<!-- automerge-github-path-blocked -->"
            already_commented=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
              --paginate --jq ".[].body" | grep -F "$marker" || true)
            if [ -z "$already_commented" ]; then
              message="$marker
          This pull request modifies files under \`.github/\`, which can't be merged automatically. Please remove those changes - everything else is welcome."
              gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" -f body="$message"
            fi
            exit 1
          fi

      - name: Merge pull request (pinned to validated commit)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/merge" \
            -X PUT \
            -f sha="${{ github.event.pull_request.head.sha }}" \
            -f merge_method="merge"

      - name: Delete merged branch (same-repo PRs only)
        if: github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${{ github.repository }}/git/refs/heads/${{ github.event.pull_request.head.ref }}" -X DELETE
